name: Scraper Worker (Cron)

on:
  schedule:
    # Run every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI
    inputs:
      user_id:
        description: 'Specific user ID to scan (leave empty for all users)'
        required: false
        default: ''
      action_script:
        description: 'Script to run (e.g. scratch-scan.mjs)'
        required: false
        default: 'scratch-scan.mjs'
      action_args:
        description: 'Arguments for the script'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run worker process
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          SCAN_USER_ID: ${{ github.event.inputs.user_id }}
          ACTION_SCRIPT: ${{ github.event.inputs.action_script }}
          ACTION_ARGS: ${{ github.event.inputs.action_args }}
        run: node .github/scripts/run-scrapers.mjs

      - name: Notify dashboard (completion)
        if: ${{ always() && github.event_name == 'workflow_dispatch' && github.event.inputs.user_id != '' }}
        env:
          DASHBOARD_WEBHOOK_URL: ${{ secrets.DASHBOARD_WEBHOOK_URL }}
          WORKER_WEBHOOK_SECRET: ${{ secrets.WORKER_WEBHOOK_SECRET }}
          USER_ID: ${{ github.event.inputs.user_id }}
          ACTION_SCRIPT: ${{ github.event.inputs.action_script }}
          ACTION_ARGS: ${{ github.event.inputs.action_args }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DASHBOARD_WEBHOOK_URL" ] || [ -z "$WORKER_WEBHOOK_SECRET" ]; then
            echo "Dashboard webhook not configured; skipping."
            exit 0
          fi
          curl -sS -X POST "$DASHBOARD_WEBHOOK_URL" \
            -H "content-type: application/json" \
            -H "x-worker-secret: $WORKER_WEBHOOK_SECRET" \
            --data "{\"user_id\":\"$USER_ID\",\"action_script\":\"$ACTION_SCRIPT\",\"action_args\":\"$ACTION_ARGS\",\"status\":\"$JOB_STATUS\",\"run_url\":\"$RUN_URL\"}" \
            && echo "Notified dashboard."
