services:
  - type: web
    name: career-ops-streamlit
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements-streamlit.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: APIFY_API_KEY
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      # Set this to your Render app URL e.g. https://career-ops-streamlit.onrender.com
      - key: APP_BASE_URL
        sync: false
