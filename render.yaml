services:
  - type: worker
    name: career-ops-worker
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile.worker
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide this in the Render dashboard
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
    autoDeploy: true
